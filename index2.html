<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصطفى نبيل - كينج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #1a1a2e; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #302b63; z-index: 100; }
        .nav-item { color: #888; text-decoration: none; font-size: 0.9em; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #00d2ff; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        .section { display: none; text-align: center; }
        .section.active { display: block; }
        
        .card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .card h3 { color: #00d2ff; margin-bottom: 15px; }
        button { background: #00d2ff; border: none; padding: 12px 30px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1em; }
        
        .social-icons a { font-size: 30px; margin: 0 15px; transition: transform 0.3s; }
        .social-icons a:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="content">
        <section id="welcomeSection" class="section active">
            <h1 style="margin-top: 80px;">مرحباً بك!</h1>
            <p style="font-size: 1.2em; margin-top: 10px;">أنا مصطفى نبيل (كينج)</p>
            <button onclick="showSection('infoSection')">ابدأ الاستكشاف</button>
        </section>

        <section id="infoSection" class="section">
            <div class="card">
                <h3>معلوماتي الشخصية</h3>
                <p>مطور بوتات ومبرمج طموح.</p>
                <p>أحب التكنولوجيا والابتكار الدائم احب تصميم جرفك وفوتشوب.</p>
            </div>
        </section>

        <section id="projectsSection" class="section">
            <div class="card">
                <h3>أعمالي (البوتات)</h3>
                <p>صنعت بوتات متخصصة لخدمة المستخدمين ع واتساب.</p>
                <p>اللغات البرمجية: Python, JS.</p>
            </div>
        </section>

        <section id="contactSection" class="section">
            <div class="card">
                <h3>تواصل معي</h3>
                <div class="social-icons" style="margin-top: 20px;">
                    <a href="https://facebook.com/your-profile" target="_blank" style="color: #1877f2;"><i class="fab fa-facebook"></i></a>
                    <a href="https://wa.me/yournumber" target="_blank" style="color: #25d366;"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://instagram.com/your-username" target="_blank" style="color: #e1306c;"><i class="fab fa-instagram"></i></a>
                    <a href="https://t.me/yourusername" target="_blank" style="color: #0088cc;"><i class="fab fa-telegram"></i></a>
                </div>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <a class="nav-item active" onclick="showSection('welcomeSection')"><i class="fas fa-home"></i></a>
        <a class="nav-item" onclick="showSection('infoSection')"><i class="fas fa-user"></i></a>
        <a class="nav-item" onclick="showSection('projectsSection')"><i class="fas fa-code"></i></a>
        <a class="nav-item" onclick="showSection('contactSection')"><i class="fas fa-envelope"></i></a>
    </nav>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
