<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصطفى نبيل - كينج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0c29; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        .section { display: none; text-align: center; }
        .section.active { display: block; }
        
        .card { background: rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; margin-bottom: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #00d2ff; margin-bottom: 10px; }
        p { line-height: 1.6; margin-bottom: 15px; color: #d1d1d1; }
        
        .btn { background: #00d2ff; border: none; padding: 15px 40px; border-radius: 30px; color: #0f0c29; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.05); }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-icons a { font-size: 35px; transition: 0.3s; }
        .social-icons a:hover { transform: scale(1.2); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #1a1a2e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #302b63; }
        .nav-item { color: #888; font-size: 1.2em; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #00d2ff; }
    </style>
</head>
<body>

    <div class="content">
        <section id="home" class="section active">
            <h1 style="margin-top: 100px;">مرحباً بك!</h1>
            <p>أنا مصطفى نبيل (كينج)، مطور ومبرمج.</p>
            <button class="btn" onclick="show('info')">ابدأ الاستكشاف</button>
        </section>

        <section id="info" class="section">
            <div class="card">
                <h3>معلوماتي</h3>
                <p>مطور بوتات ومبرمج شغوف بالتقنية.<br>أعمل على تطوير مشاريع رقمية مبتكرة.</p>
            </div>
        </section>

        <section id="work" class="section">
            <div class="card">
                <h3>أعمالي</h3>
                <p>هنا يمكنك عرض تفاصيل البوتات أو المشاريع التي قمت ببرمجتها.</p>
            </div>
        </section>

        <section id="contact" class="section">
            <div class="card">
                <h3>تواصل معي</h3>
                <div class="social-icons">
                    <a href="https://www.facebook.com/share/18qvcniBjw/" target="_blank" style="color: #1877f2;"><i class="fab fa-facebook"></i></a>
                    <a href="https://wa.me/201014326060" target="_blank" style="color: #25d366;"><i class="fab fa-whatsapp"></i></a>
                    <a href="https://t.me/mn_12mn1" target="_blank" style="color: #0088cc;"><i class="fab fa-telegram"></i></a>
                </div>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="show('home')"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="show('info')"><i class="fas fa-user"></i></div>
        <div class="nav-item" onclick="show('work')"><i class="fas fa-code"></i></div>
        <div class="nav-item" onclick="show('contact')"><i class="fas fa-envelope"></i></div>
    </nav>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
