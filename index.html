<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصطفى نبيل - كينج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0c29; color: white; min-height: 100vh; }
        
        /* الخلفية الرئيسية لصفحة الترحيب */
        #home { 
            background: url('48b729b8-00a0-4b78-8b78-79008eee2cca.png') no-repeat center center/cover; 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }

        /* خلفية قسم المعلومات */
        #info { 
            background: url('IMG_20260601_020336_086.jpg') no-repeat center center/cover; 
            padding: 100px 20px; text-align: center; 
        }

        .content { padding-bottom: 90px; }
        .section { display: none; text-align: center; }
        .section.active { display: block; }
        
        .card { background: rgba(0, 0, 0, 0.6); border-radius: 20px; padding: 30px; margin: auto; max-width: 600px; backdrop-filter: blur(5px); }
        .btn-more { background: #00d2ff; color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #1a1a2e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #302b63; z-index: 100; }
        .nav-item { color: #888; font-size: 1.2em; cursor: pointer; }
        .nav-item.active { color: #00d2ff; }
    </style>
</head>
<body>

    <div class="content">
        <section id="home" class="section active">
            <h1>مصطفى نبيل - كينج</h1>
            <p>مطور ومصمم إبداعي</p>
            <button class="btn-more" onclick="show('info')">اعرف المزيد</button>
        </section>

        <section id="info" class="section">
            <div class="card">
                <h3>معلومات عني</h3>
                <p>أنا مصطفى نبيل، متخصص في البرمجة وتطوير البوتات وعاشق للفوتوشوب والتصميم.</p>
            </div>
        </section>

        <section id="work" class="section">
            <div class="card">
                <h3>أعمالي</h3>
                <p>كينج بوت: 150+ أمر لحماية الجروبات والبارات.</p>
            </div>
        </section>

        <section id="contact" class="section">
            <div class="card">
                <h3>تواصل معي</h3>
                <a href="https://www.facebook.com/share/18qvcniBjw/">فيسبوك</a> | 
                <a href="https://wa.me/201014326060">واتساب</a> | 
                <a href="https://t.me/mn_12mn1">تليجرام</a>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="show('home')"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="show('info')"><i class="fas fa-user"></i></div>
        <div class="nav-item" onclick="show('work')"><i class="fas fa-code"></i></div>
        <div class="nav-item" onclick="show('contact')"><i class="fas fa-envelope"></i></div>
    </nav>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
